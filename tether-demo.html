<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tether — Interactive Demo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    background: #000005; color: #fff; font-family: 'JetBrains Mono', monospace;
    display: flex; flex-direction: column; align-items: center; min-height: 100vh;
  }
  
  .header { text-align: center; padding: 20px; }
  .header h1 { font-size: 28px; color: #00FFF0; text-shadow: 0 0 20px rgba(0,255,240,0.5); }
  .header p { color: #666; font-size: 12px; margin-top: 4px; }
  
  .demo-container {
    position: relative;
    width: 800px; height: 500px;
    border: 1px solid rgba(0,255,240,0.2);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0,255,240,0.1);
  }
  
  canvas#demoCanvas {
    width: 100%; height: 100%;
    display: block;
  }
  
  .controls {
    display: flex; gap: 12px; align-items: center;
    margin-top: 16px; flex-wrap: wrap; justify-content: center;
  }
  
  .btn {
    background: rgba(0,255,240,0.1);
    border: 1px solid rgba(0,255,240,0.3);
    color: #00FFF0; padding: 8px 20px;
    border-radius: 8px; font-family: 'JetBrains Mono', monospace;
    font-size: 13px; cursor: pointer; transition: all 0.2s;
  }
  .btn:hover { background: rgba(0,255,240,0.2); border-color: #00FFF0; }
  .btn-primary {
    background: linear-gradient(135deg, #00FFF0, #00BFFF);
    color: #000; border: none; font-weight: 700;
  }
  .btn-primary:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(0,255,240,0.3); }
  
  .stats {
    display: flex; gap: 24px; margin-top: 12px;
    font-size: 12px; color: #888;
  }
  .stats span { color: #00FFF0; font-weight: 700; }
  
  .legend {
    display: flex; gap: 20px; margin-top: 8px;
    font-size: 11px; color: #666; flex-wrap: wrap; justify-content: center;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
</style>
</head>
<body>

<div class="header">
  <h1>🕸️ TETHER — Interactive Demo</h1>
  <p>Neon canyon · Pendulum physics · Grappling hook · Screen shake · Sparks</p>
</div>

<div class="demo-container">
  <canvas id="demoCanvas"></canvas>
</div>

<div class="controls">
  <button class="btn btn-primary" onclick="swing(30, 80)">🎯 30° · 80m</button>
  <button class="btn btn-primary" onclick="swing(45, 80)">🎯 45° · 80m</button>
  <button class="btn btn-primary" onclick="swing(60, 80)">🎯 60° · 80m</button>
  <button class="btn" onclick="bigShake()">💥 Shake!</button>
  <button class="btn" onclick="reset()">↺ Reset</button>
</div>

<div class="stats">
  Angle: <span id="angleDisplay">—</span>
  Tether: <span id="tetherDisplay">—</span>
  Shake: <span id="shakeDisplay">0</span>
  Sparks: <span id="sparkDisplay">0</span>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#00FFF0"></div> Player</div>
  <div class="legend-item"><div class="legend-dot" style="background:#FFD700"></div> Grapple point</div>
  <div class="legend-item"><div class="legend-dot" style="background:#00FF7F"></div> Target platform</div>
  <div class="legend-item"><div class="legend-dot" style="background:#FF0040"></div> Sparks</div>
</div>

<script>
const canvas = document.getElementById('demoCanvas');
const ctx = canvas.getContext('2d');

const W = 800, H = 500;
canvas.width = W;
canvas.height = H;

// Game objects
const grapple = { x: 400, y: 80 };
const startPlatform = { x: 120, y: 430 };
const targetPlatform = { x: 650, y: 430 };

// State
let angle = 0;
let tetherLen = 0;
let massX = startPlatform.x;
let massY = startPlatform.y;
let angularVel = 0;
let currentAngle = 0;
let swinging = false;
let shakeIntensity = 0;
let sparks = [];
let trail = [];
let particles = [];
let showTrails = true;
let time = 0;

const GRAVITY = 980;

function swing(deg, length) {
  angle = deg;
  tetherLen = length;
  currentAngle = (90 - deg) * Math.PI / 180;
  angularVel = 0;
  massX = startPlatform.x;
  massY = startPlatform.y;
  swinging = true;
  trail = [];
  shakeIntensity = 8;
  spawnSparks(massX, massY, '#00FFF0', 15);
  document.getElementById('angleDisplay').textContent = deg + '°';
  document.getElementById('tetherDisplay').textContent = length + 'm';
}

function bigShake() {
  shakeIntensity = 25;
  spawnSparks(massX, massY, '#FF0040', 40);
}

function reset() {
  swinging = false;
  angle = 0;
  tetherLen = 0;
  currentAngle = 0;
  angularVel = 0;
  massX = startPlatform.x;
  massY = startPlatform.y;
  trail = [];
  sparks = [];
  shakeIntensity = 0;
  document.getElementById('angleDisplay').textContent = '—';
  document.getElementById('tetherDisplay').textContent = '—';
}

function spawnSparks(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 1 + Math.random() * 5;
    sparks.push({
      x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
      color, life: 1, maxLife: 0.3 + Math.random() * 0.7,
      radius: 1 + Math.random() * 3
    });
  }
}

function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#000008');
  grad.addColorStop(0.4, '#0a0a1a');
  grad.addColorStop(1, '#050510');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  
  // Stars
  for (let i = 0; i < 50; i++) {
    const sx = (i * 137 + 42) % W;
    const sy = (i * 89 + 42) % (H * 0.4);
    const sr = 0.5 + ((i * 31) % 3) * 0.5;
    ctx.fillStyle = `rgba(255,255,255,${0.2 + ((i * 17) % 5) * 0.1})`;
    ctx.beginPath();
    ctx.arc(sx, sy, sr, 0, Math.PI * 2);
    ctx.fill();
  }
  
  // Canyon walls
  ctx.fillStyle = 'rgba(0,255,240,0.04)';
  ctx.fillRect(0, 0, 25, H-50);
  ctx.fillRect(W-25, 0, 25, H-50);
  
  // Floor
  ctx.fillStyle = 'rgba(0,255,240,0.06)';
  ctx.fillRect(0, H-50, W, 50);
  
  // Floor glow
  ctx.save();
  ctx.shadowBlur = 15;
  ctx.shadowColor = '#00FFF0';
  ctx.strokeStyle = 'rgba(0,255,240,0.15)';
  ctx.beginPath();
  ctx.moveTo(0, H-50);
  ctx.lineTo(W, H-50);
  ctx.stroke();
  ctx.restore();
  
  // Wall accents
  ctx.save();
  ctx.strokeStyle = 'rgba(0,255,240,0.08)';
  ctx.lineWidth = 1;
  for (let y = 40; y < H-50; y += 60) {
    ctx.beginPath(); ctx.moveTo(20, y); ctx.lineTo(25, y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(W-20, y); ctx.lineTo(W-25, y); ctx.stroke();
  }
  ctx.restore();
}

function drawPlatform(x, y, color, label) {
  ctx.save();
  ctx.shadowBlur = 18;
  ctx.shadowColor = color;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.roundRect(x - 35, y - 6, 70, 12, 4);
  ctx.fill();
  
  ctx.shadowBlur = 30;
  ctx.globalAlpha = 0.2;
  ctx.fillRect(x - 35, y, 70, 3);
  ctx.restore();
  
  // Edge dots
  ctx.fillStyle = '#fff';
  ctx.globalAlpha = 0.4;
  ctx.fillRect(x - 30, y - 3, 3, 6);
  ctx.fillRect(x + 27, y - 3, 3, 6);
  ctx.globalAlpha = 1;
  
  if (label) {
    ctx.fillStyle = color;
    ctx.font = '10px "JetBrains Mono", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(label, x, y - 16);
  }
}

function drawGrapplePoint() {
  const gx = grapple.x, gy = grapple.y;
  ctx.save();
  
  ctx.shadowBlur = 25;
  ctx.shadowColor = '#FFD700';
  ctx.beginPath();
  ctx.arc(gx, gy, 16, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,215,0,0.1)';
  ctx.fill();
  
  ctx.shadowBlur = 12;
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(gx, gy, 10, 0, Math.PI*2);
  ctx.stroke();
  
  ctx.shadowBlur = 8;
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(gx, gy, 3, 0, Math.PI*2);
  ctx.fill();
  
  ctx.restore();
}

function drawTether() {
  if (!swinging) return;
  ctx.save();
  
  // Glow line
  ctx.shadowBlur = 10;
  ctx.shadowColor = '#00FFF0';
  ctx.strokeStyle = 'rgba(0,255,240,0.6)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(grapple.x, grapple.y);
  ctx.lineTo(massX, massY);
  ctx.stroke();
  
  // Core line
  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(grapple.x, grapple.y);
  ctx.lineTo(massX, massY);
  ctx.stroke();
  
  ctx.restore();
}

function drawPlayer() {
  ctx.save();
  ctx.shadowBlur = 20;
  ctx.shadowColor = '#00FFF0';
  
  ctx.beginPath();
  ctx.moveTo(massX, massY - 10);
  ctx.lineTo(massX + 7, massY);
  ctx.lineTo(massX, massY + 10);
  ctx.lineTo(massX - 7, massY);
  ctx.closePath();
  ctx.fillStyle = '#00FFF0';
  ctx.fill();
  
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.beginPath();
  ctx.moveTo(massX, massY - 4);
  ctx.lineTo(massX + 3, massY);
  ctx.lineTo(massX, massY + 4);
  ctx.lineTo(massX - 3, massY);
  ctx.closePath();
  ctx.fill();
  
  ctx.restore();
}

function drawTrail() {
  if (!showTrails || trail.length < 2) return;
  for (let i = 0; i < trail.length; i++) {
    const alpha = (i / trail.length) * 0.3;
    const r = 3 * (i / trail.length);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowBlur = 6;
    ctx.shadowColor = '#00FFF0';
    ctx.fillStyle = '#00FFF0';
    ctx.beginPath();
    ctx.arc(trail[i].x, trail[i].y, Math.max(r, 1), 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

function drawSparks() {
  for (const s of sparks) {
    ctx.save();
    ctx.shadowBlur = 6;
    ctx.shadowColor = s.color;
    ctx.globalAlpha = Math.max(0, s.life);
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.radius * s.life, 0, Math.PI*2);
    ctx.fillStyle = s.color;
    ctx.fill();
    ctx.restore();
  }
}

function drawHUD() {
  const alpha = Math.sin(time * 3) * 0.3 + 0.7;
  ctx.save();
  ctx.globalAlpha = alpha;
  
  // Angle arc
  if (swinging) {
    ctx.strokeStyle = 'rgba(255,215,0,0.3)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.arc(grapple.x, grapple.y, tetherLen, -Math.PI/2, -Math.PI/2 + currentAngle);
    ctx.stroke();
    ctx.setLineDash([]);
    
    // Angle label
    const labelAngle = -Math.PI/2 + currentAngle / 2;
    const labelR = tetherLen * 0.6;
    ctx.fillStyle = '#FFD700';
    ctx.font = '12px "JetBrains Mono", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(angle + '°', grapple.x + labelR * Math.cos(labelAngle), grapple.y + labelR * Math.sin(labelAngle) + 4);
  }
  
  ctx.restore();
}

function update(dt) {
  time += dt;
  
  if (swinging) {
    // Pendulum physics
    const alpha = -(GRAVITY / tetherLen) * Math.sin(currentAngle);
    angularVel += alpha * dt;
    currentAngle += angularVel * dt;
    
    massX = grapple.x + tetherLen * Math.sin(currentAngle);
    massY = grapple.y + tetherLen * Math.cos(currentAngle);
    
    // Trail
    trail.push({ x: massX, y: massY });
    if (trail.length > 20) trail.shift();
    
    // Check landing
    const dx = massX - targetPlatform.x;
    const dy = massY - targetPlatform.y;
    if (Math.sqrt(dx*dx + dy*dy) < 35 && !document.getElementById('landedMsg').textContent) {
      document.getElementById('landedMsg').textContent = '✦ LANDED!';
      spawnSparks(massX, massY, '#00FF7F', 25);
      shakeIntensity = 8;
    }
    
    // Check fall
    if (massY > H - 45) {
      document.getElementById('landedMsg').textContent = '✗ FELL';
      spawnSparks(massX, massY, '#FF0040', 30);
      shakeIntensity = 15;
      swinging = false;
    }
  }
  
  // Sparks
  for (const s of sparks) {
    s.x += s.vx * 60 * dt;
    s.y += s.vy * 60 * dt;
    s.vx *= 0.95;
    s.vy *= 0.95;
    s.vy += 100 * dt;
    s.life -= (1 / s.maxLife) * 60 * dt;
  }
  sparks = sparks.filter(s => s.life > 0);
  
  // Shake decay
  shakeIntensity *= Math.pow(0.88, 60 * dt);
  if (shakeIntensity < 0.2) shakeIntensity = 0;
  
  // Update displays
  document.getElementById('shakeDisplay').textContent = shakeIntensity.toFixed(1);
  document.getElementById('sparkDisplay').textContent = sparks.length;
}

function render() {
  ctx.save();
  
  // Screen shake
  if (shakeIntensity > 0.2) {
    const sx = (Math.random() - 0.5) * shakeIntensity;
    const sy = (Math.random() - 0.5) * shakeIntensity;
    ctx.translate(sx, sy);
  }
  
  drawBackground();
  drawSparks();
  drawPlatform(startPlatform.x, startPlatform.y, '#00FFF0', 'START');
  drawPlatform(targetPlatform.x, targetPlatform.y, '#00FF7F', 'TARGET');
  drawGrapplePoint();
  drawTrail();
  drawTether();
  drawPlayer();
  drawHUD();
  
  // Vignette
  const vg = ctx.createRadialGradient(W/2, H/2, W*0.2, W/2, H/2, W*0.7);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.3)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);
  
  ctx.restore();
}

let lastTime = 0;
function loop(time) {
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

// Handle roundRect polyfill
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    this.moveTo(x + r, y);
    this.arcTo(x + w, y, x + w, y + h, r);
    this.arcTo(x + w, y + h, x, y + h, r);
    this.arcTo(x, y + h, x, y, r);
    this.arcTo(x, y, x + w, y, r);
  };
}

// Add landed message element
const msgDiv = document.createElement('div');
msgDiv.id = 'landedMsg';
msgDiv.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:32px;font-weight:bold;pointer-events:none;text-shadow:0 0 20px currentColor;';
document.querySelector('.demo-container').appendChild(msgDiv);

// Clear message on swing
const originalSwing = swing;
swing = function(deg, len) {
  msgDiv.textContent = '';
  document.getElementById('landedMsg').textContent = '';
  originalSwing(deg, len);
};

lastTime = performance.now();
requestAnimationFrame(loop);
</script>
</body>
</html>
